<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Changelog — Adsvisory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --border: #1e2330;
      --text: #e8eaf0;
      --muted: #5a6070;
      --accent: #4F8EF7;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 80px;
      line-height: 1.5;
    }

    /* HEADER */
    header {
      padding: 56px 48px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      overflow: visible;
    }

    .header-left {
      overflow: visible;
      padding-bottom: 0.2em;
    }

    .header-left h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      padding-bottom: 0.35em;
      overflow: visible;
    }

    .header-left h1 span {
      color: var(--accent);
    }

    .header-left p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      font-family: 'DM Mono', monospace;
    }

    .header-right {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: right;
    }

    /* FILTERS */
    .filters {
      padding: 24px 48px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .filters-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-right: 4px;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--c, #4F8EF7);
      color: var(--c, #4F8EF7);
      padding: 5px 14px;
      border-radius: 99px;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      opacity: 0.35;
    }

    .filter-btn.active {
      background: color-mix(in srgb, var(--c, #4F8EF7) 12%, transparent);
      opacity: 1;
    }

    /* CONTENT */
    .content { padding: 0 48px; }

    .month-group { margin-top: 48px; }

    .month-header {
      font-size: 1rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
      font-family: 'DM Mono', monospace;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead tr {
      border-bottom: 1px solid var(--border);
    }

    th {
      text-align: left;
      padding: 8px 12px;
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: 'DM Mono', monospace;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr.data-row { cursor: pointer; }
    tbody tr.data-row:hover { background: var(--surface); }

    .detail-row td { padding: 0; border-bottom: none; }
    .detail-cell {
      background: #0a0d13;
      border-bottom: 1px solid var(--border);
      padding: 14px 24px !important;
    }
    .detail-body {
      font-size: 0.82rem;
      color: var(--text);
      white-space: pre-wrap;
      font-family: 'DM Mono', monospace;
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
    }

    .detail-commits-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .commits-list { display: flex; flex-direction: column; gap: 4px; }

    .commit-line {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--text);
      display: flex;
      gap: 12px;
      align-items: baseline;
    }

    .commit-sha {
      font-size: 0.7rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .td-pr { white-space: nowrap; }
    .expand-chevron {
      margin-left: 6px;
      color: var(--muted);
      font-size: 0.85rem;
      display: inline-block;
      transition: transform 0.2s;
      user-select: none;
    }
    .expand-chevron.open { transform: rotate(180deg); }

    td {
      padding: 12px 12px;
      vertical-align: middle;
      line-height: 1.5;
    }

    .td-date {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .td-time {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      opacity: 0.6;
      margin-top: 2px;
    }

    .repo-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid;
      font-size: 0.75rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .type-badge {
      white-space: nowrap;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .td-title { font-weight: 600; }

    .scope {
      display: inline-block;
      background: #ffffff10;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 1px 6px;
      border-radius: 4px;
      margin-right: 6px;
    }

    .pr-link {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      text-decoration: none;
      transition: color 0.15s;
    }

    .pr-link:hover { color: var(--accent); }

    tr.hidden { display: none; }

    /* EMPTY STATE */
    .empty { padding: 80px 48px; text-align: center; color: var(--muted); }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      header, .filters, .content { padding-left: 20px; padding-right: 20px; }
      th:nth-child(1), td:nth-child(1),
      th:nth-child(5), td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Change<span>log</span></h1>
    <p>// semua perubahan produk adsvisory dalam satu tempat</p>
  </div>
  <div class="header-right">
    Diperbarui otomatis<br>14 Mei 2026 pukul 01.53 WIB
  </div>
</header>

<div class="filters">
  <span class="filters-label">filter:</span>
  <button class="filter-btn active" data-repo="avq-artha" style="--c:#4F8EF7" onclick="toggleFilter(this)">Artha</button><button class="filter-btn active" data-repo="avq-astra" style="--c:#F7934F" onclick="toggleFilter(this)">Astra</button><button class="filter-btn active" data-repo="avq-shastra" style="--c:#7C4FF7" onclick="toggleFilter(this)">Shastra</button><button class="filter-btn active" data-repo="avq-sutra" style="--c:#4FF7A0" onclick="toggleFilter(this)">Sutra</button>
</div>

<div class="content">
  <div class="empty">Belum ada data changelog.</div>
</div>

<script>
  function toggleFilter(btn) {
    btn.classList.toggle('active');
    applyFilters();
  }

  function applyFilters() {
    const activeLabels = [...document.querySelectorAll('.filter-btn.active')]
      .map(b => b.textContent.trim());

    document.querySelectorAll('tbody tr.data-row').forEach(row => {
      const repoBadge = row.querySelector('.repo-badge');
      if (!repoBadge) return;
      const badgeText = repoBadge.textContent.trim();
      row.classList.toggle('hidden', !activeLabels.includes(badgeText));
    });

    // Collapse all detail rows when filter changes
    document.querySelectorAll('tbody tr.detail-row').forEach(r => r.classList.add('hidden'));
    document.querySelectorAll('.expand-chevron').forEach(c => c.classList.remove('open'));
  }

  function toggleDetail(id) {
    const row = document.getElementById('detail-' + id);
    const chev = document.getElementById('chev-' + id);
    if (!row) return;
    row.classList.toggle('hidden');
    if (chev) chev.classList.toggle('open');
  }
</script>
</body>
</html>
